server {
    listen 80;
    server_name localhost;

    # Use Docker's internal DNS to resolve containers dynamically
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Keep original Host header and pass IPs
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Set dynamic variables to prevent Nginx startup crashes if backends are still booting
    set $client_app "http://blockgo-backend:80";
    set $middleware "http://host.docker.internal:4000";

    # C# Auth Endpoints
    location /api/Auth/ {
        proxy_pass $client_app;
    }

    # C# GradeTemplate Endpoints
    location /api/GradeTemplate/ {
        proxy_pass $client_app;
    }

    # Chat Hub WebSocket (SignalR)
    location /chatHub {
        proxy_pass $client_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
    }

    # Node.js Middleware (all other /api/ requests)
    location /api/ {
        proxy_pass $middleware;
    }

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
}