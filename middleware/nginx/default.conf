server {
    listen 80;
    server_name localhost;

    resolver 127.0.0.11 valid=10s ipv6=off;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
    proxy_connect_timeout 5s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    set $backend_main "blockgo-backend:5000"; 
    set $middleware_main "host.docker.internal:4000";
    set $ipfs_node0 "ipfs0:8080";
    set $ipfs_api "ipfs0:5001";

    location /chatHub {
        proxy_pass http://$backend_main;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
    }

    location /ipfs/ {
        proxy_set_header Host localhost;
        proxy_set_header X-Forwarded-Host localhost;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port 8080;
        proxy_set_header X-IPFS-Gateway-Prefix /ipfs;

        proxy_pass http://$ipfs_node0;
    }
    location /ipfs-webui/ {
        
        proxy_set_header Host localhost:5001;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-IPFS-Gateway-Prefix /ipfs-webui;
        proxy_set_header X-IPFS-Path /ipfs-webui;
        
        rewrite ^/ipfs-webui$ /ipfs-webui/ permanent;
        rewrite ^/ipfs-webui/(.*) /webui/$1 break;
        proxy_pass http://$ipfs_api;
    }

    location /api/v0/ {
        proxy_set_header Host localhost:5001;
        proxy_set_header Origin http://localhost:8080;
        proxy_set_header X-IPFS-Gateway-Prefix /api/v0;
        
        proxy_pass http://$ipfs_api;
        proxy_cache_bypass $http_upgrade;
    }

    location ^~ /api/Grades {
        proxy_pass http://$backend_main;
    }

    location ^~ /api/Student {
        proxy_pass http://$backend_main;
    }

    location ^~ /api/GradeTemplate {
        proxy_pass http://$backend_main;
    }

    location ^~ /api/Auth/ {
        proxy_pass http://$backend_main;
    }

    location ^~ /api/registrar/ {
        proxy_pass http://$backend_main;
    }

    location /api/login {
        proxy_pass http://$middleware_main;
    }

    location /api/register {
        proxy_pass http://$middleware_main;
    }

    location /api/bootstrap {
        proxy_pass http://$middleware_main;
    }

    location /api/fabric {
        proxy_pass http://$middleware_main;
    }

    location /api/ {
        proxy_pass http://$middleware_main;
    }

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
}
