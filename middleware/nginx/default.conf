upstream backend_fallback {
    server main.capstone.com:5000 max_fails=1 fail_timeout=10s;
    server annex.capstone.com:5000 backup max_fails=1 fail_timeout=10s;
    server pubad.capstone.com:5000 backup max_fails=1 fail_timeout=10s;
}

upstream middleware_fallback {
    server main.capstone.com:4000 max_fails=1 fail_timeout=10s;
    server annex.capstone.com:4000 backup max_fails=1 fail_timeout=10s;
    server pubad.capstone.com:4000 backup max_fails=1 fail_timeout=10s;
}

upstream ipfs_gateway_fallback {
    server main.capstone.com:8081 max_fails=1 fail_timeout=10s;
    server annex.capstone.com:8083 backup max_fails=1 fail_timeout=10s;
    server pubad.capstone.com:8085 backup max_fails=1 fail_timeout=10s;
}

upstream ipfs_api_fallback {
    server main.capstone.com:5001 max_fails=1 fail_timeout=10s;
    server annex.capstone.com:5003 backup max_fails=1 fail_timeout=10s;
    server pubad.capstone.com:5005 backup max_fails=1 fail_timeout=10s;
}

server {
    listen 80;
    server_name localhost;
    resolver 127.0.0.11 valid=10s ipv6=off;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
    proxy_connect_timeout 5s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    client_max_body_size 10m;

    # C# backend is reached through the host-published port so this works whether
    # the backend is running as the blockgo-backend container or directly in WSL.
    set $backend_main "host.docker.internal:5000";
    set $middleware_main "host.docker.internal:4000";
    set $ipfs_gateway "ipfs:8080";
    set $ipfs_api "ipfs:5001";

    location = /nginx-health {
        access_log off;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "no-store" always;
        return 200 "ok\n";
    }

    location @backend_fallback {
        proxy_pass http://backend_fallback;
    }

    location @backend_ws_fallback {
        proxy_pass http://backend_fallback;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
    }

    location @middleware_fallback {
        proxy_pass http://middleware_fallback;
    }

    location @ipfs_gateway_fallback {
        proxy_set_header Host localhost;
        proxy_set_header X-Forwarded-Host localhost;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port 8080;
        proxy_set_header X-IPFS-Gateway-Prefix /ipfs;

        proxy_pass http://ipfs_gateway_fallback;
    }

    location @ipfs_webui_fallback {
        proxy_set_header Host localhost:5001;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-IPFS-Gateway-Prefix /ipfs-webui;
        proxy_set_header X-IPFS-Path /ipfs-webui;

        proxy_pass http://ipfs_api_fallback;
    }

    location @ipfs_v0_fallback {
        proxy_set_header Host localhost:5001;
        proxy_set_header Origin http://localhost:8080;
        proxy_set_header X-IPFS-Gateway-Prefix /api/v0;

        proxy_pass http://ipfs_api_fallback;
    }

    location /chatHub {
        proxy_intercept_errors on;
        error_page 502 503 504 = @backend_ws_fallback;
        proxy_pass http://$backend_main;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
    }

    location /ipfs/ {
        proxy_intercept_errors on;
        error_page 502 503 504 = @ipfs_gateway_fallback;
        proxy_set_header Host localhost;
        proxy_set_header X-Forwarded-Host localhost;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port 8080;
        proxy_set_header X-IPFS-Gateway-Prefix /ipfs;

        proxy_pass http://$ipfs_gateway;
    }
    location /ipfs-webui/ {
        proxy_intercept_errors on;
        error_page 502 503 504 = @ipfs_webui_fallback;
        
        proxy_set_header Host localhost:5001;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-IPFS-Gateway-Prefix /ipfs-webui;
        proxy_set_header X-IPFS-Path /ipfs-webui;
        
        rewrite ^/ipfs-webui$ /ipfs-webui/ permanent;
        rewrite ^/ipfs-webui/(.*) /webui/$1 break;
        proxy_pass http://$ipfs_api;
    }

    location /api/v0/ {
        proxy_intercept_errors on;
        error_page 502 503 504 = @ipfs_v0_fallback;
        proxy_set_header Host localhost:5001;
        proxy_set_header Origin http://localhost:8080;
        proxy_set_header X-IPFS-Gateway-Prefix /api/v0;
        
        proxy_pass http://$ipfs_api;
        proxy_cache_bypass $http_upgrade;
    }

    location ^~ /api/Grades {
        proxy_intercept_errors on;
        error_page 502 503 504 = @backend_fallback;
        proxy_pass http://$backend_main;
    }

    location ^~ /api/Student {
        proxy_intercept_errors on;
        error_page 502 503 504 = @backend_fallback;
        proxy_pass http://$backend_main;
    }

    location ^~ /api/GradeTemplate {
        proxy_intercept_errors on;
        error_page 502 503 504 = @backend_fallback;
        proxy_pass http://$backend_main;
    }

    location ^~ /api/Auth/ {
        proxy_intercept_errors on;
        error_page 502 503 504 = @backend_fallback;
        proxy_pass http://$backend_main;
    }

    location ^~ /api/registrar/ {
        proxy_intercept_errors on;
        error_page 502 503 504 = @backend_fallback;
        proxy_pass http://$backend_main;
    }

    location /api/login {
        proxy_intercept_errors on;
        error_page 502 503 504 = @middleware_fallback;
        proxy_pass http://$middleware_main;
    }

    location /api/register {
        proxy_intercept_errors on;
        error_page 502 503 504 = @middleware_fallback;
        proxy_pass http://$middleware_main;
    }

    location /api/bootstrap {
        proxy_intercept_errors on;
        error_page 502 503 504 = @middleware_fallback;
        proxy_pass http://$middleware_main;
    }

    location /api/fabric {
        proxy_intercept_errors on;
        error_page 502 503 504 = @middleware_fallback;
        proxy_pass http://$middleware_main;
    }

    location /api/ {
        proxy_intercept_errors on;
        error_page 502 503 504 = @middleware_fallback;
        proxy_pass http://$middleware_main;
    }

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
}
