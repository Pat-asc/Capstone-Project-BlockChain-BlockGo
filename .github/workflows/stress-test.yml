name: Stress Test & Validation

on:
  pull_request:
    branches: [ Macbook ]
  workflow_dispatch:

concurrency:
  group: stress-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  stress-test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy System
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
          POSTGRES_PASS: ${{ secrets.POSTGRES_PASS }}
          BOOTSTRAP_REGISTRAR_PASS: ${{ secrets.BOOTSTRAP_REGISTRAR_PASS }}
          MOCK_REGISTRAR_PASS: ${{ secrets.MOCK_REGISTRAR_PASS }}
        run: |
          set -e
          chmod +x ./network/full_deploy.sh
          
          timeout 600 ./network/full_deploy.sh > deploy.log 2>&1 || {
            echo "✗ Deployment failed"
            tail -100 deploy.log
            exit 1
          }
          
          echo "Waiting for services..."
          for port in 5000 4000 8080; do
            timeout 120 bash -c "while ! nc -z localhost $port; do sleep 2; done"
          done
          sleep 10
          echo "✓ System ready"

      - name: Baseline Tests
        env:
          MOCK_REGISTRAR_PASS: ${{ secrets.MOCK_REGISTRAR_PASS }}
        run: |
          set -e
          
          # Health
          curl -sf http://localhost:8080/api/health > /dev/null
          
          # Login
          TOKEN=$(curl -s -X POST http://localhost:8080/api/login \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"registrar@plv.edu.ph\", \"password\":\"$MOCK_REGISTRAR_PASS\"}" \
            | jq -r '.token')
          [ -n "$TOKEN" ] || { echo "Login failed"; exit 1; }
          
          # Protected endpoint
          curl -sf -H "Authorization: Bearer $TOKEN" \
            http://localhost:8080/api/all-grades > /dev/null
          
          echo "✓ Baseline tests passed"

      - name: Batch Upload Test
        env:
          MOCK_REGISTRAR_PASS: ${{ secrets.MOCK_REGISTRAR_PASS }}
        run: |
          set -e
          
          # Create test CSV
          cat > batch_grades.csv <<EOF
          StudentID,CourseCode,Grade
          2021-0001,CS101,1.25
          2021-0002,CS102,1.50
          EOF
          
          # Get token
          TOKEN=$(curl -s -X POST http://localhost:8080/api/login \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"registrar@plv.edu.ph\", \"password\":\"$MOCK_REGISTRAR_PASS\"}" \
            | jq -r '.token')
          
          # Upload
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            http://localhost:8080/api/batch-upload \
            -H "Authorization: Bearer $TOKEN" \
            -F "excel=@batch_grades.csv")
          
          # Accept 200, 400, 422 (validation) but fail on 502, 504, 404
          case $STATUS in
            200|400|422) echo "✓ Upload processed (HTTP $STATUS)" ;;
            502|504|404) echo "✗ Upload endpoint failed (HTTP $STATUS)"; exit 1 ;;
            *) echo "⚠ Unexpected status $STATUS"; exit 1 ;;
          esac

      - name: Stress Test - Health Endpoint
        run: |
          npx autocannon -c 150 -d 20 \
            --requests '[{"path": "/api/health"}]' \
            http://localhost:8080
          echo "✓ Stress test completed"

      - name: Stress Test - Grade Endpoint (Authenticated)
        env:
          MOCK_REGISTRAR_PASS: ${{ secrets.MOCK_REGISTRAR_PASS }}
        run: |
          TOKEN=$(curl -s -X POST http://localhost:8080/api/login \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"registrar@plv.edu.ph\", \"password\":\"$MOCK_REGISTRAR_PASS\"}" \
            | jq -r '.token')
          
          # Create autocannon request with auth header
          npx autocannon \
            -c 100 -d 15 \
            --headers '{"Authorization":"Bearer '"$TOKEN"'"}' \
            http://localhost:8080/api/all-grades || true
          
          echo "✓ Authenticated stress test completed"

      - name: Cleanup
        if: always()
        run: |
          set +e
          cd network
          docker compose down -v --remove-orphans 2>/dev/null
          pkill -9 -f "full_deploy\|node\|dotnet" 2>/dev/null

      - name: Collect Logs
        if: always()
        run: |
          cat deploy.log > stress_test_audit.log 2>/dev/null || echo "No logs available"

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stress-test-logs
          path: stress_test_audit.log
          retention-days: 7
