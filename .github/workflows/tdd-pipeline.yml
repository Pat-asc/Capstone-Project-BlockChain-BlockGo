name: TDD Double-Verify & Docker Cleanup

on:
  pull_request:
    branches: [ Macbook ]
  workflow_dispatch:

jobs:
  double-verify-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- PHASE 1: INITIAL VERIFICATION ---
      - name: Start System (Phase 1)
        run: |
          chmod +x ./network/full_deploy.sh
          # full_deploy.sh contains an infinite loop, so it MUST be run in the background
          nohup ./network/full_deploy.sh > deploy_p1.log 2>&1 &
          
          echo "Waiting for services to spin up (this may take a few minutes)..."
          timeout 600 bash -c 'while ! nc -z localhost 5000; do sleep 5; done'
          timeout 120 bash -c 'while ! nc -z localhost 4000; do sleep 5; done'
          sleep 15

      - name: Automated Functional Tests (Phase 1)
        run: |
          echo "Running functional API tests..."
          # 1. Health Check
          curl -s -f http://localhost:4000/api/health || exit 1
          
          # 2. Test Registrar Authentication
          echo "Testing Login Flow..."
          LOGIN_RESP=$(curl -s -X POST http://localhost:4000/api/login \
            -H "Content-Type: application/json" \
            -d '{"username":"registrar@plv.edu.ph", "password":"admin123"}')
          
          TOKEN=$(echo $LOGIN_RESP | jq -r '.token')
          if [ "$TOKEN" == "null" ] || [ -z "$TOKEN" ]; then
            echo "Login failed. Response: $LOGIN_RESP"
            exit 1
          fi
          
          # 3. Test Protected Fabric Route
          echo "Testing Blockchain Read (all-grades)..."
          curl -s -f http://localhost:4000/api/all-grades -H "Authorization: Bearer $TOKEN" || exit 1
          echo "Phase 1 Functional Tests Passed."

      # --- PHASE 2: CLEAN SLATE (The "Reset" Step) ---
      - name: Shutdown & Wipe Volumes
        run: |
          echo "Stopping services and wiping docker volumes..."
          cd network
          docker compose down -v || true 
          pkill -f dotnet || true
          pkill -f node || true
          pkill -f full_deploy || true
          sleep 5

      # --- PHASE 3: FINAL VERIFICATION ---
      - name: Start System (Phase 2 - Clean Run)
        run: |
          cd network
          nohup ./full_deploy.sh > ../deploy_p2.log 2>&1 &
          
          echo "Waiting for services to spin up..."
          timeout 600 bash -c 'while ! nc -z localhost 5000; do sleep 5; done'
          timeout 120 bash -c 'while ! nc -z localhost 4000; do sleep 5; done'
          sleep 15

      - name: Stress Test & System Verification (Phase 2)
        run: |
          # Frontend is served by Nginx on port 8080
          curl -s -f http://localhost:8080 || exit 1
          
          echo "Running Stress/Load Test with Autocannon..."
          # Autocannon fires rapid concurrent requests to test server durability under load.
          # This will open 100 concurrent connections for 15 seconds straight.
          npx autocannon -c 100 -d 15 http://localhost:4000/api/health
          
          echo "Phase 2 Verified and Stress Tested Successfully."

      # --- STAGE 4: LOG CONSOLIDATION ------
      - name: Create Master Log
        if: always() # Ensures logs are created even if tests fail
        run: |
          echo "=== SYSTEM LOG REPORT ===" > full_system_audit.log
          echo "--- PHASE 1 DEPLOY LOGS ---" >> full_system_audit.log
          cat deploy_p1.log >> full_system_audit.log || true
          echo "--- PHASE 2 DEPLOY LOGS ---" >> full_system_audit.log
          cat deploy_p2.log >> full_system_audit.log || true

      - name: Upload Audit Logs
        uses: actions/upload-artifact@v4
        with:
          name: full-github-actions-audit
          path: full_system_audit.log