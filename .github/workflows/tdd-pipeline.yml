name: TDD Full Stack - Macbook Branch

on:
  pull_request:
    # This ensures the action only runs when merging into 'Macbook'
    branches: [ Macbook ]

jobs:
  tdd-pipeline:
    # Running on ubuntu-latest is standard, but the code targets your Macbook branch
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. TDD Validation: Network and Middleware
      - name: Pre-Flight TDD Checks
        run: |
          chmod +x ./network/full_deploy.sh
          ./network/full_deploy.sh
          node ./middleware/middleware.js --test

      # 2. Start Backend (Separate "Command Line" 1)
      - name: Start Dotnet Backend
        run: |
          cd frontend
          dotnet clean
          dotnet build
          # nohup keeps it running, & puts it in background
          nohup dotnet run > ../backend.log 2>&1 & 
          echo "Backend is warming up..."

      # 3. Start Frontend (Separate "Command Line" 2)
      - name: Start Node Frontend
        run: |
          cd frontend
          npm install
          npm run build
          nohup npm start > ../frontend.log 2>&1 & 
          echo "Frontend is warming up..."

      # 4. Continuous Logging & Endpoint Testing (Separate "Command Line" 3)
      - name: Live Log Stream & API Verification
        run: |
          echo "--- INITIALIZING LIVE LOGS ---"
          touch backend.log frontend.log
          tail -f backend.log & 
          tail -f frontend.log &
          
          # Wait for services to be "Properly Running"
          sleep 20
          
          echo "Verifying API Endpoints..."
          # TDD Approach: Fail the build if the API isn't exactly right
          curl -s -f http://localhost:5000/api/health || (echo "CRITICAL: API Failure" && exit 1)
          
          echo "Invoking Frontend..."
          curl -s -f http://localhost:3000 || (echo "CRITICAL: Frontend Failure" && exit 1)
          
          echo "System verified. All TDD requirements met."

      # 5. Automated Merge into Macbook Branch
      - name: Finalize Merge
        if: success()
        uses: pascalgn/automerge-action@v0.16.3
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          MERGE_METHOD: "squash"
          # Ensure your PR has this label, or remove this line to merge all passing PRs
          MERGE_LABELS: "automerge" 
          # Explicitly target the branch if needed by the action
          MERGE_FILTER_AUTHOR: ""