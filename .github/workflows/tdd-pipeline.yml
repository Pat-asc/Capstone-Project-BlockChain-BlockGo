name: TDD Full Stack - Stress Test & Double Wipe

on:
  pull_request:
    branches: [ Macbook ]
  workflow_dispatch:

concurrency:
  group: tdd-pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tdd-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Verify Database Schema
        run: |
          if ! grep -q 'CREATE TABLE IF NOT EXISTS users' ./network/init-db-schema.sql; then
            echo "✗ Database schema uses incorrect casing"
            exit 1
          fi
          echo "✓ Database schema is correct"

      - name: Validate Deployment Script
        run: |
          if ! [ -f ./network/full_deploy.sh ]; then
            echo "✗ full_deploy.sh not found"
            exit 1
          fi
          bash -n ./network/full_deploy.sh || { echo "✗ Deployment script has syntax errors"; exit 1; }
          echo "✓ Deployment script is valid"

      # --- PHASE 1: DEPLOYMENT ---
      - name: Deploy System
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
          POSTGRES_PASS: ${{ secrets.POSTGRES_PASS }}
          BOOTSTRAP_REGISTRAR_PASS: ${{ secrets.BOOTSTRAP_REGISTRAR_PASS }}
          MOCK_REGISTRAR_PASS: ${{ secrets.MOCK_REGISTRAR_PASS }}
        run: |
          set -e
          chmod +x ./network/full_deploy.sh
          
          # Run deployment synchronously (not in background)
          timeout 600 ./network/full_deploy.sh > network_deploy.log 2>&1 || {
            EXIT_CODE=$?
            echo "✗ Deployment failed with exit code $EXIT_CODE"
            tail -100 network_deploy.log
            exit $EXIT_CODE
          }
          echo "✓ Deployment completed successfully"

      - name: Wait for Services
        run: |
          set -e
          echo "Waiting for services..."
          for port in 5000 4000 8080; do
            timeout 120 bash -c "while ! nc -z localhost $port; do sleep 2; done" || {
              echo "✗ Service on port $port failed to start"
              exit 1
            }
            echo "✓ Port $port is ready"
          done
          sleep 10

      - name: Health Check
        run: |
          HEALTH=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/health)
          if [ "$HEALTH" != "200" ]; then
            echo "✗ Health check failed: $HEALTH"
            exit 1
          fi
          echo "✓ Health check passed"

      # --- PHASE 2: FUNCTIONAL TESTS ---
      - name: Functional Tests
        env:
          MOCK_REGISTRAR_PASS: ${{ secrets.MOCK_REGISTRAR_PASS }}
        run: |
          set -e
          
          # Test login
          TOKEN=$(curl -s -X POST http://localhost:8080/api/login \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"registrar@plv.edu.ph\", \"password\":\"$MOCK_REGISTRAR_PASS\"}" \
            | jq -r '.token // empty')
          
          if [ -z "$TOKEN" ]; then
            echo "✗ Login failed"
            exit 1
          fi
          echo "✓ Login successful"
          
          # Test protected route
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            http://localhost:8080/api/all-grades)
          
          if [ "$STATUS" != "200" ]; then
            echo "✗ Protected route returned: $STATUS"
            exit 1
          fi
          echo "✓ Protected route accessible"

      # --- PHASE 3: STRESS TEST ---
      - name: Stress Test with Autocannon
        run: |
          npx autocannon -c 150 -d 20 http://localhost:8080/api/health
          echo "✓ Stress test completed"

      # --- PHASE 4: CLEAN SLATE (WIPE & RESTART) ---
      - name: Wipe Volumes
        run: |
          set +e
          cd network
          docker compose down -v --remove-orphans 2>/dev/null
          docker system prune -f --volumes 2>/dev/null
          pkill -9 -f "full_deploy\|node\|dotnet" 2>/dev/null
          sleep 5
          set -e
          echo "✓ Volumes wiped"

      # --- PHASE 5: SECOND DEPLOYMENT (CLEAN RUN) ---
      - name: Second Deployment (Validation)
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
          POSTGRES_PASS: ${{ secrets.POSTGRES_PASS }}
          BOOTSTRAP_REGISTRAR_PASS: ${{ secrets.BOOTSTRAP_REGISTRAR_PASS }}
          MOCK_REGISTRAR_PASS: ${{ secrets.MOCK_REGISTRAR_PASS }}
        run: |
          set -e
          chmod +x ./network/full_deploy.sh
          
          timeout 600 ./network/full_deploy.sh > network_deploy_p2.log 2>&1 || {
            EXIT_CODE=$?
            echo "✗ Second deployment failed"
            tail -100 network_deploy_p2.log
            exit $EXIT_CODE
          }
          echo "✓ Second deployment successful"

      - name: Wait for Services (2nd Run)
        run: |
          set -e
          for port in 5000 4000 8080; do
            timeout 120 bash -c "while ! nc -z localhost $port; do sleep 2; done"
          done
          sleep 10
          echo "✓ Services ready"

      - name: Verify System Stability
        env:
          MOCK_REGISTRAR_PASS: ${{ secrets.MOCK_REGISTRAR_PASS }}
        run: |
          # Quick validation that system is stable after wipe
          for i in {1..3}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/health)
            [ "$STATUS" = "200" ] || exit 1
          done
          echo "✓ System is stable"

      # --- CLEANUP ---
      - name: Cleanup
        if: always()
        run: |
          set +e
          cd network
          docker compose down -v --remove-orphans 2>/dev/null
          pkill -9 -f "full_deploy\|node\|dotnet" 2>/dev/null
          echo "✓ Cleanup complete"

      # --- LOGS & ARTIFACTS ---
      - name: Collect Logs
        if: always()
        run: |
          {
            echo "=== PHASE 1 DEPLOYMENT ==="
            cat network_deploy.log 2>/dev/null || echo "(no logs)"
            echo ""
            echo "=== PHASE 2 DEPLOYMENT ==="
            cat network_deploy_p2.log 2>/dev/null || echo "(no logs)"
          } > full_audit.log

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tdd-pipeline-logs
          path: full_audit.log
          retention-days: 7

      # --- MERGE ---
      - name: Auto-Merge on Success
        if: success()
        uses: pascalgn/automerge-action@v0.16.3
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          MERGE_METHOD: "squash"
          MERGE_LABELS: "automerge"
