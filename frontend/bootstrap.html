<!DOCTYPE html>
<html>
<head>
    <title>Bootstrap Registrar Account</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; border: 1px solid #ccc; padding: 20px; border-radius: 8px; }
        button { padding: 10px 20px; background: #003366; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background: #001f4d; }
        #result { margin-top: 20px; padding: 10px; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .loading { color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bootstrap Registrar Account</h1>
        <p>Click the button below to create the default registrar account.</p>
        <p><strong>Default Credentials:</strong></p>
        <ul>
            <li>Email: registrar@plv.edu.ph</li>
            <li>Password: admin123</li>
        </ul>
        <button onclick="bootstrap()">Bootstrap Registrar</button>
        <div id="result"></div>
    </div>

    <script>
        async function bootstrap() {
            const resultDiv = document.getElementById('result');
            resultDiv.textContent = 'Creating registrar account...';
            resultDiv.className = 'loading';

            try {
                const response = await fetch('/api/bootstrap');
                const data = await response.json();

                if (response.ok) {
                    resultDiv.textContent = 'Success! ' + data.message;
                    resultDiv.className = 'success';
                    setTimeout(() => {
                        resultDiv.textContent = 'You can now login with registrar@plv.edu.ph / admin123';
                    }, 2000);
                } else {
                    resultDiv.textContent = 'Error: ' + (data.message || data.error || 'Unknown error');
                    resultDiv.className = 'error';
                }
            } catch (error) {
                resultDiv.textContent = 'Error: ' + error.message;
                resultDiv.className = 'error';
            }
        }
    </script>
</body>
</html>
