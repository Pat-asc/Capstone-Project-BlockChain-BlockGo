---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all-ingress
  namespace: plv-fabric
spec:
  podSelector: {}
  policyTypes:
  - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-public-ingress
  namespace: plv-fabric
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - middleware-api
          - client-app
          - frontend
          - ipfs-node
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector: {}
    - ipBlock:
        cidr: 35.191.0.0/16
    - ipBlock:
        cidr: 130.211.0.0/22
---
# NetworkPolicy: Allow inter-pod communication within plv-fabric
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-fabric-internal
  namespace: plv-fabric
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector: {}
