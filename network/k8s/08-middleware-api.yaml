---
# Middleware API Service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: middleware-api
  namespace: plv-fabric
spec:
  replicas: 1
  selector:
    matchLabels:
      app: middleware-api
      tier: application
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: middleware-api
        tier: application
    spec:
      serviceAccountName: fabric-sa
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - middleware-api
              topologyKey: kubernetes.io/hostname
      containers:
      - name: middleware
        image: registry.example.com/plv-repo/fabric-middleware:latest
        imagePullPolicy: Always
        workingDir: /app/middleware
        command: ["/bin/sh", "-c"]
        args: ["npm rebuild bcrypt --build-from-source && npm start"]
        ports:
        - containerPort: 4000
          name: api
          protocol: TCP
        envFrom:
        - secretRef:
            name: blockgo-secrets
        env:
        - name: NODE_ENV
          value: production
        - name: PORT
          value: "4000"
        - name: CSHARP_API_URL
          value: "http://client-app-service.plv-fabric.svc.cluster.local:5000"
        - name: IPFS_API_URL
          value: "/dns4/ipfs-api.plv-fabric.svc.cluster.local/tcp/5001/http"
        - name: POSTGRES_DB
          value: ActivityLogs
        - name: POSTGRES_HOST
          value: postgres.plv-main-campus.svc.cluster.local
        - name: POSTGRES_PORT
          value: "5432"
        - name: COUCHDB_WALLET_REGISTRAR_URL
          value: http://capstone:pass123@couchdb-wallet-registrar.plv-main-campus.svc.cluster.local:5984
        - name: COUCHDB_WALLET_FACULTY_URL
          value: http://capstone:pass123@couchdb-wallet-faculty.plv-annex-campus.svc.cluster.local:5984
        - name: COUCHDB_WALLET_DEPARTMENT_URL
          value: http://capstone:pass123@couchdb-wallet-department.plv-pubad-campus.svc.cluster.local:5984
        - name: CHANNEL_NAME
          value: registrar-channel
        - name: CHAINCODE_NAME
          value: registrar
        - name: FABRIC_CA_REGISTRAR_URL
          value: "https://ca-registrar.plv-main-campus.svc.cluster.local:7054"
        - name: FABRIC_CA_FACULTY_URL
          value: "https://ca-faculty.plv-annex-campus.svc.cluster.local:7054"
        - name: FABRIC_CA_DEPARTMENT_URL
          value: "https://ca-department.plv-pubad-campus.svc.cluster.local:7054"
        - name: FABRIC_CA_REGISTRAR_CERT
          value: "/etc/hyperledger/fabric-ca-roots/registrar-ca-cert.pem"
        - name: FABRIC_CA_REGISTRAR_TLS_CERT
          value: "/etc/hyperledger/fabric-ca-roots/registrar-tls-cert.pem"
        - name: FABRIC_CA_FACULTY_CERT
          value: "/etc/hyperledger/fabric-ca-roots/faculty-ca-cert.pem"
        - name: FABRIC_CA_FACULTY_TLS_CERT
          value: "/etc/hyperledger/fabric-ca-roots/faculty-tls-cert.pem"
        - name: FABRIC_CA_DEPARTMENT_CERT
          value: "/etc/hyperledger/fabric-ca-roots/department-ca-cert.pem"
        - name: FABRIC_CA_DEPARTMENT_TLS_CERT
          value: "/etc/hyperledger/fabric-ca-roots/department-tls-cert.pem"
        - name: FABRIC_CA_INSECURE_TLS
          value: "true"
        volumeMounts:
        - name: fabric-ca-roots
          mountPath: /etc/hyperledger/fabric-ca-roots
          readOnly: true
        livenessProbe:
          httpGet:
            path: /api/health
            port: 4000
            scheme: HTTP
          initialDelaySeconds: 120
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: 4000
            scheme: HTTP
          initialDelaySeconds: 60
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: fabric-ca-roots
        secret:
          secretName: fabric-ca-roots
---
apiVersion: v1
kind: Service
metadata:
  name: middleware-api
  namespace: plv-fabric
  labels:
    app: middleware-api
  annotations:
    cloud.google.com/neg: '{"ingress": true}'
spec:
  type: ClusterIP
  selector:
    app: middleware-api
  ports:
  - port: 4000
    targetPort: 4000
    protocol: TCP
    name: api
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
---
apiVersion: v1
kind: Service
metadata:
  name: middleware
  namespace: plv-fabric
  labels:
    app: middleware-api
spec:
  type: ClusterIP
  selector:
    app: middleware-api
  ports:
  - port: 4000
    targetPort: 4000
    protocol: TCP
    name: api
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: middleware-api-hpa
  namespace: plv-fabric
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: middleware-api
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
