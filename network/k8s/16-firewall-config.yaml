---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: firewall-main-dbs
  namespace: plv-main-campus
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values: [couchdb-registrar, couchdb-wallet-registrar, postgres-primary]
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: peer-registrar
    ports:
    - protocol: TCP
      port: 5984
  - from:
    - namespaceSelector: {}
      podSelector:
        matchExpressions:
          - key: app
            operator: In
            values: [middleware-api, client-app, plv-client-app, postgres-replica-annex, postgres-replica-pubad]
    ports:
    - protocol: TCP
      port: 5984
    - protocol: TCP
      port: 5432
---
