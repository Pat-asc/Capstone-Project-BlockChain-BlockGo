---
# PostgreSQL Replica (Annex Campus)
apiVersion: v1
kind: Service
metadata:
  name: postgres-replica-annex
  namespace: plv-annex-campus
spec:
  type: ClusterIP
  ports:
  - port: 5432
  selector:
    app: postgres-replica-annex
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-replica-annex
  namespace: plv-annex-campus
spec:
  serviceName: postgres-replica-annex
  replicas: 1
  selector:
    matchLabels:
      app: postgres-replica-annex
  template:
    metadata:
      labels:
        app: postgres-replica-annex
    spec:
      securityContext:
        fsGroup: 1001
      serviceAccountName: fabric-sa
      containers:
      - name: postgres
        image: bitnami/postgresql:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRESQL_REPLICATION_MODE
          value: slave
        - name: POSTGRESQL_MASTER_HOST
          value: postgres.plv-main-campus.svc.cluster.local
        - name: POSTGRESQL_MASTER_PORT_NUMBER
          value: "5432"
        - name: POSTGRESQL_USERNAME
          valueFrom:
            secretKeyRef:
              name: blockgo-secrets
              key: POSTGRES_USER
        - name: POSTGRESQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: blockgo-secrets
              key: POSTGRES_PASS
        - name: POSTGRESQL_DATABASE
          valueFrom:
            secretKeyRef:
              name: blockgo-secrets
              key: POSTGRES_DB
        - name: POSTGRESQL_REPLICATION_USER
          value: repl_user
        - name: POSTGRESQL_REPLICATION_PASSWORD
          valueFrom:
            secretKeyRef:
              name: blockgo-secrets
              key: POSTGRES_REPL_PASS
        - name: POSTGRESQL_MASTER_PASSWORD
          valueFrom:
            secretKeyRef:
              name: blockgo-secrets
              key: POSTGRES_PASS
        volumeMounts:
        - name: postgres-storage
          mountPath: /bitnami/postgresql
  volumeClaimTemplates:
  - metadata:
      name: postgres-storage
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 2Gi
