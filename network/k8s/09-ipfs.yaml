---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ipfs-init-config
  namespace: plv-fabric
data:
  01-disable-autoconf.sh: |-
    #!/bin/sh
    echo "Disabling AutoConf and clearing auto-placeholders for private network..."
    ipfs config --json AutoConf.Enabled false
    ipfs config --json Bootstrap "[]"
    ipfs config --json DNS.Resolvers "{}"
    ipfs config --json Routing.DelegatedRouters "[]"
    ipfs config --json Ipns.DelegatedPublishers "[]"
    ipfs config Routing.Type dht
    ipfs config --json AutoTLS.Enabled false
    cp /etc/ipfs/swarm.key /data/ipfs/swarm.key || true
---
# IPFS Node StatefulSet (Distributed Storage)
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ipfs-node
  namespace: plv-fabric
spec:
  serviceName: ipfs-headless
  replicas: 1
  selector:
    matchLabels:
      app: ipfs-node
  template:
    metadata:
      labels:
        app: ipfs-node
    spec:
      serviceAccountName: fabric-sa
      securityContext:
        runAsUser: 0
        runAsGroup: 0
        fsGroup: 0
      initContainers:
      - name: fix-permissions
        image: busybox
        securityContext:
          runAsUser: 0
        command: ["sh", "-c", "chown -R 1000:100 /data/ipfs"]
        volumeMounts:
        - name: ipfs-data
          mountPath: /data/ipfs
      containers:
      - name: ipfs
        image: ipfs/kubo:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 4001
          name: swarm
          protocol: TCP
        - containerPort: 5001
          name: api
          protocol: TCP
        - containerPort: 8080
          name: gateway
          protocol: TCP
        env:
        - name: IPFS_PROFILE
          value: server
        - name: IPFS_SWARM_KEY_FILE
          value: "/etc/ipfs/swarm.key"
        - name: LIBP2P_FORCE_PNET
          value: "1"
        - name: IPFS_ALLOW_ROOT
          value: "true"
        volumeMounts:
        - name: ipfs-data
          mountPath: /data/ipfs
        - name: swarm-key
          mountPath: /etc/ipfs/swarm.key
          subPath: swarm.key
        - name: ipfs-export
          mountPath: /export
        - name: ipfs-init-volume
          mountPath: /container-init.d/01-disable-autoconf.sh
          subPath: 01-disable-autoconf.sh
        livenessProbe:
          exec:
            command:
            - ipfs
            - id
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - ipfs
            - id
          initialDelaySeconds: 15
          periodSeconds: 5
      volumes:
      - name: swarm-key
        configMap:
          name: ipfs-swarm-key
      - name: ipfs-export
        emptyDir: {}
      - name: ipfs-init-volume
        configMap:
          name: ipfs-init-config
          defaultMode: 0777
  volumeClaimTemplates:
  - metadata:
      name: ipfs-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: ipfs-headless
  namespace: plv-fabric
  labels:
    app: ipfs-node
spec:
  clusterIP: None
  selector:
    app: ipfs-node
  ports:
  - port: 4001
    targetPort: 4001
    protocol: TCP
    name: swarm
  - port: 5001
    targetPort: 5001
    protocol: TCP
    name: api
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: gateway
---
apiVersion: v1
kind: Service
metadata:
  name: ipfs-api
  namespace: plv-fabric
  labels:
    app: ipfs-node
spec:
  type: ClusterIP
  selector:
    app: ipfs-node
  ports:
  - port: 5001
    targetPort: 5001
    protocol: TCP
    name: api
---
apiVersion: v1
kind: Service
metadata:
  name: ipfs-gateway
  namespace: plv-fabric
  annotations:
    cloud.google.com/neg: '{"ingress": true}'
  labels:
    app: ipfs-node
spec:
  type: ClusterIP
  selector:
    app: ipfs-node
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: gateway
---
# Ingress for IPFS Gateway
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ipfs-ingress
  namespace: plv-fabric
  annotations:
    kubernetes.io/ingress.class: gce
spec:
  rules:
  - http:
      paths:
      - path: /ipfs
        pathType: Prefix
        backend:
          service:
            name: ipfs-gateway
            port:
              number: 8080
