apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: main-ingress
  namespace: plv-fabric
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  rules:
  - host: plv-blockgo.com
    http:
      paths:
      - path: /api/Auth
        pathType: Prefix
        backend:
          service:
            name: client-app-service
            port:
              number: 5000
      - path: /api/Grades
        pathType: Prefix
        backend:
          service:
            name: client-app-service
            port:
              number: 5000
      - path: /api/SystemSettings
        pathType: Prefix
        backend:
          service:
            name: middleware-api
            port:
              number: 4000
      - path: /api/Student
        pathType: Prefix
        backend:
          service:
            name: client-app-service
            port:
              number: 5000
      - path: /api/Sectioning
        pathType: Prefix
        backend:
          service:
            name: client-app-service
            port:
              number: 5000
      - path: /api/GradeTemplate
        pathType: Prefix
        backend:
          service:
            name: client-app-service
            port:
              number: 5000
      - path: /api/registrar
        pathType: Prefix
        backend:
          service:
            name: client-app-service
            port:
              number: 5000
      - path: /chatHub
        pathType: Prefix
        backend:
          service:
            name: client-app-service
            port:
              number: 5000
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: middleware-api
            port:
              number: 4000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80