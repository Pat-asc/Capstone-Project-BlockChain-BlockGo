---
# Monitoring: Prometheus ServiceMonitor (requires Prometheus Operator)
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: plv-fabric
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    scrape_configs:
    - job_name: 'fabric-orderer'
      kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
          - plv-main-campus
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: orderer
      - source_labels: [__meta_kubernetes_pod_container_port_number]
        action: keep
        regex: "8443"
    - job_name: 'fabric-peer'
      kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
          - plv-main-campus
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: peer-.*
    - job_name: 'middleware-api'
      static_configs:
      - targets: ['middleware-api:4000']
      metrics_path: /metrics
---
# Pod Disruption Budget (for high availability)
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: middleware-api-pdb
  namespace: plv-fabric
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: middleware-api
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: orderer-pdb
  namespace: plv-main-campus
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: orderer
---
# Resource Quota
apiVersion: v1
kind: ResourceQuota
metadata:
  name: plv-fabric-quota
  namespace: plv-fabric
spec:
  hard:
    requests.cpu: "10"
    requests.memory: 20Gi
    limits.cpu: "20"
    limits.memory: 40Gi
    pods: "50"
    persistentvolumeclaims: "10"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: plv-main-campus-quota
  namespace: plv-main-campus
spec:
  hard:
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "16"
    limits.memory: 32Gi
    pods: "30"
    persistentvolumeclaims: "5"
---
# LimitRange
apiVersion: v1
kind: LimitRange
metadata:
  name: plv-fabric-limits
  namespace: plv-fabric
spec:
  limits:
  - max:
      cpu: "2"
      memory: "2Gi"
    min:
      cpu: "100m"
      memory: "128Mi"
    default:
      cpu: "250m"
      memory: "512Mi"
    defaultRequest:
      cpu: "100m"
      memory: "256Mi"
    type: Container
  - max:
      cpu: "4"
      memory: "4Gi"
    type: Pod
---
apiVersion: v1
kind: LimitRange
metadata:
  name: plv-main-campus-limits
  namespace: plv-main-campus
spec:
  limits:
  - max:
      cpu: "4"
      memory: "4Gi"
    default:
      cpu: "250m"
      memory: "512Mi"
    defaultRequest:
      cpu: "100m"
      memory: "256Mi"
    type: Container
---
apiVersion: v1
kind: LimitRange
metadata:
  name: plv-annex-campus-limits
  namespace: plv-annex-campus
spec:
  limits:
  - default:
      cpu: "250m"
      memory: "512Mi"
    defaultRequest:
      cpu: "100m"
      memory: "256Mi"
    type: Container
---
apiVersion: v1
kind: LimitRange
metadata:
  name: plv-pubad-campus-limits
  namespace: plv-pubad-campus
spec:
  limits:
  - default:
      cpu: "250m"
      memory: "512Mi"
    defaultRequest:
      cpu: "100m"
      memory: "256Mi"
    type: Container
