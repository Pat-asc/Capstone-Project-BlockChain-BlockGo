---
# Fabric CA for Registrar Organization
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fabric-ca-registrar
  namespace: plv-main-campus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fabric-ca-registrar
  template:
    metadata:
      labels:
        app: fabric-ca-registrar
        org: registrar
    spec:
      serviceAccountName: fabric-sa
      initContainers:
      - name: init-ca
        image: alpine:latest
        imagePullPolicy: IfNotPresent
        command: ["sh", "-c", "mkdir -p /data/msp/keystore && (cp -L /raw/ca-cert.pem /data/ca-cert.pem 2>/dev/null || true) && (cp -L /raw/tls-cert.pem /data/tls-cert.pem 2>/dev/null || true) && (cp -L /raw/ca-key.pem /data/msp/keystore/key_sk 2>/dev/null || true) && (cp -L /raw/tls-key.pem /data/msp/keystore/tls_key_sk 2>/dev/null || true) && chmod -R 777 /data"]
        volumeMounts:
        - name: raw-identity
          mountPath: /raw
        - name: ca-data
          mountPath: /data
      containers:
      - name: fabric-ca
        image: hyperledger/fabric-ca:1.5.7
        command: ["sh", "-c", "fabric-ca-server start -b admin:${BOOTSTRAP_PASS} --ca.certfile /etc/hyperledger/fabric-ca-server/ca-cert.pem --ca.keyfile /etc/hyperledger/fabric-ca-server/msp/keystore/key_sk --tls.certfile /etc/hyperledger/fabric-ca-server/tls-cert.pem --tls.keyfile /etc/hyperledger/fabric-ca-server/msp/keystore/tls_key_sk -d"]
        ports:
        - containerPort: 7054
          name: ca-port
        env:
        - name: FABRIC_CA_HOME
          value: /etc/hyperledger/fabric-ca-server
        - name: FABRIC_CA_SERVER_CA_NAME
          value: ca-registrar
        - name: FABRIC_CA_SERVER_TLS_ENABLED
          value: "true"
        - name: BOOTSTRAP_PASS
          valueFrom:
            secretKeyRef:
              name: blockgo-secrets
              key: BOOTSTRAP_REGISTRAR_PASS
        volumeMounts:
        - name: ca-data
          mountPath: /etc/hyperledger/fabric-ca-server
      volumes:
      - name: ca-data
        emptyDir: {}
      - name: raw-identity
        secret:
          secretName: ca-registrar-identity
---
apiVersion: v1
kind: Service
metadata:
  name: ca-registrar
  namespace: plv-main-campus
spec:
  selector:
    app: fabric-ca-registrar
  ports:
  - port: 7054
    name: ca
