---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orderer-1
  namespace: plv-main-campus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orderer-1
  template:
    metadata:
      labels:
        app: orderer-1
        org: orderer
    spec:
      serviceAccountName: orderer-sa
      # FIXED: Map certificate hostnames to internal IPs
      hostAliases:
      - ip: "127.0.0.1"
        hostnames: ["orderer.capstone.com"]
      containers:
      - name: orderer
        image: hyperledger/fabric-orderer:2.5.4
        env:
        - name: FABRIC_CFG_PATH
          value: /etc/hyperledger/fabric
        - name: ORDERER_GENERAL_LISTENADDRESS
          value: "0.0.0.0"
        - name: ORDERER_GENERAL_LISTENPORT
          value: "7050"
        - name: ORDERER_GENERAL_LOCALMSPID
          value: OrdererMSP
        - name: ORDERER_GENERAL_LOCALMSPDIR
          value: /var/hyperledger/orderer/msp
        - name: ORDERER_GENERAL_BOOTSTRAPMETHOD
          value: file
        - name: ORDERER_GENERAL_BOOTSTRAPFILE
          value: /var/hyperledger/orderer/orderer.genesis.block
        - name: ORDERER_GENERAL_TLS_ENABLED
          value: "true"
        - name: ORDERER_GENERAL_TLS_PRIVATEKEY
          value: /var/hyperledger/orderer/tls/server.key
        - name: ORDERER_GENERAL_TLS_CERTIFICATE
          value: /var/hyperledger/orderer/tls/server.crt
        - name: ORDERER_GENERAL_TLS_ROOTCAS
          value: "[/var/hyperledger/orderer/tls/ca.crt]"
        - name: ORDERER_CHANNELPARTICIPATION_ENABLED
          value: "true"
        - name: ORDERER_ADMIN_LISTENADDRESS
          value: 0.0.0.0:7053
        - name: ORDERER_ADMIN_TLS_ENABLED
          value: "true"
        - name: ORDERER_ADMIN_TLS_PRIVATEKEY
          value: /var/hyperledger/orderer/tls/server.key
        - name: ORDERER_ADMIN_TLS_CERTIFICATE
          value: /var/hyperledger/orderer/tls/server.crt
        - name: ORDERER_ADMIN_TLS_ROOTCAS
          value: "[/var/hyperledger/orderer/tls/ca.crt]"
        - name: ORDERER_ADMIN_TLS_CLIENTROOTCAS
          value: "[/var/hyperledger/orderer/tls/ca.crt]"
        - name: ORDERER_GENERAL_CLUSTER_SERVERHOSTOVERRIDE
          value: orderer.capstone.com
        - name: ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE
          value: /var/hyperledger/orderer/tls/server.crt
        - name: ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY
          value: /var/hyperledger/orderer/tls/server.key
        - name: ORDERER_GENERAL_CLUSTER_ROOTCAS
          value: "[/var/hyperledger/orderer/tls/ca.crt]"
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
        volumeMounts:
        - name: orderer-storage
          mountPath: /var/hyperledger/production
        - name: config
          mountPath: /etc/hyperledger/fabric/orderer.yaml
          subPath: orderer.yaml
        - name: crypto
          mountPath: /var/hyperledger/orderer/msp/signcerts/cert.pem
          subPath: msp-cert.pem
        - name: crypto
          mountPath: /var/hyperledger/orderer/msp/keystore/priv_sk
          subPath: msp-key.pem
        - name: crypto
          mountPath: /var/hyperledger/orderer/msp/cacerts/ca.pem
          subPath: msp-ca.pem
        - name: crypto
          mountPath: /var/hyperledger/orderer/msp/admincerts/admin-cert.pem
          subPath: admin-cert.pem
        - name: crypto
          mountPath: /var/hyperledger/orderer/tls/server.crt
          subPath: server.crt
        - name: crypto
          mountPath: /var/hyperledger/orderer/tls/server.key
          subPath: server.key
        - name: crypto
          mountPath: /var/hyperledger/orderer/tls/ca.crt
          subPath: ca.crt
        - name: artifacts
          mountPath: /var/hyperledger/orderer/orderer.genesis.block
          subPath: orderer.genesis.block
        - name: artifacts
          mountPath: /var/hyperledger/orderer/registrar-channel.block
          subPath: registrar-channel.block
      volumes:
      - name: orderer-storage
        emptyDir: {}
      - name: config
        configMap:
          name: fabric-common-config
      - name: crypto
        secret:
          secretName: orderer-1-crypto
      - name: artifacts
        secret:
          secretName: fabric-artifacts
---
apiVersion: v1
kind: Service
metadata:
  name: orderer-1
  namespace: plv-main-campus
spec:
  selector:
    app: orderer-1
  ports:
  - port: 7050
    name: orderer
  - port: 7053
    name: admin
