---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: peer-faculty-pvc
  namespace: plv-annex-campus
spec:
  accessModes: [ "ReadWriteOnce" ]
  storageClassName: fabric-storage
  resources:
    requests:
      storage: 50Gi
---
# CouchDB for Faculty Peer
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: couchdb-faculty
  namespace: plv-annex-campus
spec:
  serviceName: couchdb-faculty
  replicas: 1
  selector:
    matchLabels:
      app: couchdb-faculty
  template:
    metadata:
      labels:
        app: couchdb-faculty
        org: faculty
    spec:
      serviceAccountName: fabric-sa
      containers:
      - name: couchdb
        image: couchdb:3.2.2
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5984
          name: couchdb
        env:
        - name: COUCHDB_USER
          valueFrom:
            secretKeyRef:
              name: blockgo-secrets
              key: COUCHDB_USER
        - name: COUCHDB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: blockgo-secrets
              key: COUCHDB_PASS
        - name: COUCHDB_SINGLE_NODE
          value: "true"
        volumeMounts:
        - name: couchdb-storage
          mountPath: /opt/couchdb/data
        livenessProbe:
          httpGet:
            path: /_up
            port: 5984
            scheme: HTTP
            httpHeaders:
            - name: Authorization
              value: "Basic Y2Fwc3RvbmU6cGFzczEyMw=="
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /_up
            port: 5984
            scheme: HTTP
            httpHeaders:
            - name: Authorization
              value: "Basic Y2Fwc3RvbmU6cGFzczEyMw=="
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes: []
  volumeClaimTemplates:
  - metadata:
      name: couchdb-storage
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 30Gi
---
apiVersion: v1
kind: Service
metadata:
  name: couchdb-faculty
  namespace: plv-annex-campus
  labels:
    app: couchdb-faculty
spec:
  selector:
    app: couchdb-faculty
  ports:
  - port: 5984
    targetPort: 5984
    name: couchdb
---
# Peer for Faculty Organization
apiVersion: apps/v1
kind: Deployment
metadata:
  name: peer-faculty
  namespace: plv-annex-campus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: peer-faculty
  template:
    metadata:
      labels:
        app: peer-faculty
        org: faculty
    spec:
      serviceAccountName: peer-sa
      containers:
      - name: peer
        image: hyperledger/fabric-peer:2.5.4
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 7051
          name: peer
        - containerPort: 7052
          name: chaincode
        - containerPort: 7053
          name: events
        env:
        - name: FABRIC_CFG_PATH
          value: /etc/hyperledger/fabric
        - name: CORE_PEER_ID
          value: peer0.faculty.capstone.com
        - name: CORE_PEER_NETWORKID
          value: plv-fabric
        - name: CORE_PEER_ADDRESS
          value: peer-faculty:7051
        - name: CORE_PEER_CHAINCODEADDRESS
          value: peer-faculty:7052
        - name: CORE_PEER_LISTENADDRESS
          value: 0.0.0.0:7051
        - name: CORE_PEER_CHAINCODELISTENADDRESS
          value: 0.0.0.0:7052
        - name: CORE_PEER_GOSSIP_BOOTSTRAP
          value: peer-faculty:7051
        - name: CORE_PEER_GOSSIP_EXTERNALENDPOINT
          value: peer-faculty:7051
        - name: CORE_PEER_LOCALMSPID
          value: FacultyMSP
        - name: CORE_PEER_MSPCONFIGPATH
          value: /var/hyperledger/msp
        - name: CORE_PEER_TLS_ENABLED
          value: "true"
        - name: CORE_PEER_TLS_CERT_FILE
          value: /var/hyperledger/tls/server.crt
        - name: CORE_PEER_TLS_KEY_FILE
          value: /var/hyperledger/tls/server.key
        - name: CORE_PEER_TLS_ROOTCERT_FILE
          value: /var/hyperledger/tls/ca.crt
        - name: CORE_LEDGER_STATE_STATEDATABASE
          value: CouchDB
        - name: CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS
          value: couchdb-faculty:5984
        - name: CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME
          valueFrom:
            secretKeyRef:
              name: blockgo-secrets
              key: COUCHDB_USER
        - name: CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD
          valueFrom:
            secretKeyRef:
              name: blockgo-secrets
              key: COUCHDB_PASS
        - name: CORE_METRICS_PROVIDER
          value: prometheus
        volumeMounts:
        - name: config
          mountPath: /etc/hyperledger/fabric/core.yaml
          subPath: core.yaml
        - name: peer-storage
          mountPath: /var/hyperledger/production
        - name: crypto
          mountPath: /var/hyperledger/msp/signcerts/cert.pem
          subPath: msp-cert.pem
        - name: crypto
          mountPath: /var/hyperledger/msp/keystore/priv_sk
          subPath: msp-key.pem
        - name: crypto
          mountPath: /var/hyperledger/msp/cacerts/ca.pem
          subPath: msp-ca.pem
        - name: crypto
          mountPath: /var/hyperledger/msp/admincerts/admin-cert.pem
          subPath: admin-cert.pem
        - name: crypto
          mountPath: /var/hyperledger/tls/server.crt
          subPath: server.crt
        - name: crypto
          mountPath: /var/hyperledger/tls/server.key
          subPath: server.key
        - name: crypto
          mountPath: /var/hyperledger/tls/ca.crt
          subPath: ca.crt
        livenessProbe:
          exec:
            command:
            - /bin/bash
            - -c
            - "CORE_PEER_ADDRESS=127.0.0.1:7051 CORE_PEER_TLS_SERVERHOSTOVERRIDE=peer0.faculty.capstone.com peer node status || exit 1"
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - /bin/bash
            - -c
            - "CORE_PEER_ADDRESS=127.0.0.1:7051 CORE_PEER_TLS_SERVERHOSTOVERRIDE=peer0.faculty.capstone.com peer node status || exit 1"
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: config
        configMap:
          name: fabric-common-config
      - name: peer-storage
        persistentVolumeClaim:
          claimName: peer-faculty-pvc
      - name: crypto
        secret:
          secretName: peer-faculty-crypto
---
apiVersion: v1
kind: Service
metadata:
  name: peer-faculty
  namespace: plv-annex-campus
  labels:
    app: peer-faculty
spec:
  type: ClusterIP
  selector:
    app: peer-faculty
  ports:
  - port: 7051
    targetPort: 7051
    protocol: TCP
    name: peer
  - port: 7052
    targetPort: 7052
    protocol: TCP
    name: chaincode
  - port: 7053
    targetPort: 7053
    protocol: TCP
    name: events
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: couchdb-wallet-faculty
  namespace: plv-annex-campus
spec:
  serviceName: couchdb-wallet-faculty
  replicas: 1
  selector:
    matchLabels:
      app: couchdb-wallet-faculty
  template:
    metadata:
      labels:
        app: couchdb-wallet-faculty
    spec:
      containers:
      - name: couchdb
        image: couchdb:3.2.2
        ports:
        - containerPort: 5984
          name: couchdb
        env:
        - name: COUCHDB_USER
          valueFrom:
            secretKeyRef:
              name: blockgo-secrets
              key: COUCHDB_USER
        - name: COUCHDB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: blockgo-secrets
              key: COUCHDB_PASS
        - name: COUCHDB_SINGLE_NODE
          value: "true"
        volumeMounts:
        - name: couchdb-wallet-storage
          mountPath: /opt/couchdb/data
  volumeClaimTemplates:
  - metadata:
      name: couchdb-wallet-storage
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: couchdb-wallet-faculty
  namespace: plv-annex-campus
spec:
  selector:
    app: couchdb-wallet-faculty
  ports:
  - port: 5984
    name: couchdb
