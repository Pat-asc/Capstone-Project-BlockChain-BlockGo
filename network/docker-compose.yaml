networks:
  registrar-net:
    name: registrar-net

services:
  # --- CERTIFICATE AUTHORITIES ---
  ca.registrar.capstone.com:
    image: hyperledger/fabric-ca:${CA_VERSION:-1.5.7}
    container_name: ca.registrar.capstone.com
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-registrar
      - FABRIC_CA_SERVER_TLS_ENABLED=true
    ports: ["7054:7054"]
    command: sh -c 'fabric-ca-server start -b admin:${BOOTSTRAP_REGISTRAR_PASS:-admin123} -d'
    volumes: ["./fabric-ca/registrar:/etc/hyperledger/fabric-ca-server"]
    networks: [registrar-net]

  ca.faculty.capstone.com:
    image: hyperledger/fabric-ca:${CA_VERSION:-1.5.7}
    container_name: ca.faculty.capstone.com
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-faculty
      - FABRIC_CA_SERVER_TLS_ENABLED=true
    ports: ["8054:7054"]
    command: sh -c 'fabric-ca-server start -b admin:${BOOTSTRAP_REGISTRAR_PASS:-admin123} -d'
    volumes: ["./fabric-ca/faculty:/etc/hyperledger/fabric-ca-server"]
    networks: [registrar-net]

  ca.department.capstone.com:
    image: hyperledger/fabric-ca:${CA_VERSION:-1.5.7}
    container_name: ca.department.capstone.com
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-department
      - FABRIC_CA_SERVER_TLS_ENABLED=true
    ports: ["9054:7054"]
    command: sh -c 'fabric-ca-server start -b admin:${BOOTSTRAP_REGISTRAR_PASS:-admin123} -d'
    volumes: ["./fabric-ca/department:/etc/hyperledger/fabric-ca-server"]
    networks: [registrar-net]

  # --- ORDERER ---
  orderer.capstone.com:
    image: hyperledger/fabric-orderer:${FABRIC_VERSION:-2.5.4}
    container_name: orderer.capstone.com
    environment:
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_BOOTSTRAPMETHOD=file
      - ORDERER_GENERAL_BOOTSTRAPFILE=/var/hyperledger/orderer/orderer.genesis.block
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=/var/hyperledger/orderer/tls/ca.crt
      - ORDERER_GENERAL_TLS_CLIENTAUTHREQUIRED=false
      - ORDERER_ADMIN_LISTENADDRESS=0.0.0.0:7053
      - ORDERER_ADMIN_TLS_ENABLED=true
      - ORDERER_ADMIN_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_ADMIN_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_ADMIN_TLS_ROOTCAS=/var/hyperledger/orderer/tls/ca.crt
      - ORDERER_ADMIN_TLS_CLIENTAUTHREQUIRED=true
    ports: ["7050:7050", "7053:7053"]
    networks: [registrar-net]
    volumes:
      - ./channel-artifacts-final/orderer.genesis.block:/var/hyperledger/orderer/orderer.genesis.block
      - ./crypto-config-final-v2/ordererOrganizations/capstone.com/orderers/orderer.capstone.com/msp:/var/hyperledger/orderer/msp
      - ./crypto-config-final-v2/ordererOrganizations/capstone.com/orderers/orderer.capstone.com/tls:/var/hyperledger/orderer/tls

  couchdb_registrar:
    image: couchdb:3.2.2
    container_name: couchdb_registrar
    environment:
      - COUCHDB_USER=${COUCHDB_USER}
      - COUCHDB_PASSWORD=${COUCHDB_PASS}
      - COUCHDB_SINGLE_NODE=true
    ports: ["5985:5984"]
    networks: [registrar-net]

  couchdb_registrar_peer1:
    image: couchdb:3.2.2
    container_name: couchdb_registrar_peer1
    environment:
      - COUCHDB_USER=${COUCHDB_USER}
      - COUCHDB_PASSWORD=${COUCHDB_PASS}
      - COUCHDB_SINGLE_NODE=true
    ports: ["5986:5984"]
    networks: [registrar-net]

  couchdb_faculty:
    image: couchdb:3.2.2
    container_name: couchdb_faculty
    environment:
      - COUCHDB_USER=${COUCHDB_USER}
      - COUCHDB_PASSWORD=${COUCHDB_PASS}
      - COUCHDB_SINGLE_NODE=true
    ports: ["6984:5984"]
    networks: [registrar-net]

  couchdb_faculty_peer1:
    image: couchdb:3.2.2
    container_name: couchdb_faculty_peer1
    environment:
      - COUCHDB_USER=${COUCHDB_USER}
      - COUCHDB_PASSWORD=${COUCHDB_PASS}
      - COUCHDB_SINGLE_NODE=true
    ports: ["6985:5984"]
    networks: [registrar-net]

  couchdb_department:
    image: couchdb:3.2.2
    container_name: couchdb_department
    environment:
      - COUCHDB_USER=${COUCHDB_USER}
      - COUCHDB_PASSWORD=${COUCHDB_PASS}
      - COUCHDB_SINGLE_NODE=true
    ports: ["7984:5984"]
    networks: [registrar-net]

  couchdb_department_peer1:
    image: couchdb:3.2.2
    container_name: couchdb_department_peer1
    environment:
      - COUCHDB_USER=${COUCHDB_USER}
      - COUCHDB_PASSWORD=${COUCHDB_PASS}
      - COUCHDB_SINGLE_NODE=true
    ports: ["7985:5984"]
    networks: [registrar-net]

  # --- PEERS ---
  peer0.registrar.capstone.com:
    container_name: peer0.registrar.capstone.com
    image: hyperledger/fabric-peer:${FABRIC_VERSION:-2.5.4}
    environment:
      - CORE_PEER_ID=peer0.registrar.capstone.com
      - CORE_PEER_ADDRESS=peer0.registrar.capstone.com:7051
      - CORE_PEER_LOCALMSPID=RegistrarMSP
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.registrar.capstone.com:7051
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.registrar.capstone.com:7051,peer0.faculty.capstone.com:7051,peer0.department.capstone.com:7051
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb_registrar:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=${COUCHDB_USER}
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=${COUCHDB_PASS}
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/crypto-config-final-v2/peerOrganizations/registrar.capstone.com/peers/peer0.registrar.capstone.com/tls/ca.crt
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/crypto-config-final-v2/peerOrganizations/registrar.capstone.com/peers/peer0.registrar.capstone.com/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/crypto-config-final-v2/peerOrganizations/registrar.capstone.com/peers/peer0.registrar.capstone.com/tls/server.key
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/crypto-config-final-v2/peerOrganizations/registrar.capstone.com/peers/peer0.registrar.capstone.com/msp
    ports: ["7051:7051"]
    networks: [registrar-net]
    volumes: 
      - ./crypto-config-final-v2:/etc/hyperledger/fabric/crypto-config-final-v2
    depends_on: [couchdb_registrar]

  peer1.registrar.capstone.com:
    container_name: peer1.registrar.capstone.com
    image: hyperledger/fabric-peer:${FABRIC_VERSION:-2.5.4}
    environment:
      - CORE_PEER_ID=peer1.registrar.capstone.com
      - CORE_PEER_ADDRESS=peer1.registrar.capstone.com:7051
      - CORE_PEER_LOCALMSPID=RegistrarMSP
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer1.registrar.capstone.com:7051
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.registrar.capstone.com:7051,peer0.faculty.capstone.com:7051,peer0.department.capstone.com:7051
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb_registrar_peer1:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=${COUCHDB_USER}
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=${COUCHDB_PASS}
      - CORE_PEER_TLS_ENABLED=false
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/crypto-config-final-v2/peerOrganizations/registrar.capstone.com/peers/peer1.registrar.capstone.com/msp
    ports: ["8051:7051"]
    networks: [registrar-net]
    volumes: ["./crypto-config-final-v2:/etc/hyperledger/fabric/crypto-config-final-v2"]
    depends_on: [couchdb_registrar_peer1]

  peer0.faculty.capstone.com:
    container_name: peer0.faculty.capstone.com
    image: hyperledger/fabric-peer:${FABRIC_VERSION:-2.5.4}
    environment:
      - CORE_PEER_ID=peer0.faculty.capstone.com
      - CORE_PEER_ADDRESS=peer0.faculty.capstone.com:7051
      - CORE_PEER_LOCALMSPID=FacultyMSP
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.faculty.capstone.com:7051
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.registrar.capstone.com:7051,peer0.faculty.capstone.com:7051,peer0.department.capstone.com:7051
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb_faculty:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=${COUCHDB_USER}
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=${COUCHDB_PASS}
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/crypto-config-final-v2/peerOrganizations/faculty.capstone.com/peers/peer0.faculty.capstone.com/tls/ca.crt
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/crypto-config-final-v2/peerOrganizations/faculty.capstone.com/peers/peer0.faculty.capstone.com/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/crypto-config-final-v2/peerOrganizations/faculty.capstone.com/peers/peer0.faculty.capstone.com/tls/server.key
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/crypto-config-final-v2/peerOrganizations/faculty.capstone.com/peers/peer0.faculty.capstone.com/msp
    ports: ["9051:7051"]
    networks: [registrar-net]
    volumes: 
      - ./crypto-config-final-v2:/etc/hyperledger/fabric/crypto-config-final-v2
    depends_on: [couchdb_faculty]

  peer1.faculty.capstone.com:
    container_name: peer1.faculty.capstone.com
    image: hyperledger/fabric-peer:${FABRIC_VERSION:-2.5.4}
    environment:
      - CORE_PEER_ID=peer1.faculty.capstone.com
      - CORE_PEER_ADDRESS=peer1.faculty.capstone.com:7051
      - CORE_PEER_LOCALMSPID=FacultyMSP
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer1.faculty.capstone.com:7051
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.registrar.capstone.com:7051,peer0.faculty.capstone.com:7051,peer0.department.capstone.com:7051
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb_faculty_peer1:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=${COUCHDB_USER}
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=${COUCHDB_PASS}
      - CORE_PEER_TLS_ENABLED=false
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/crypto-config-final-v2/peerOrganizations/faculty.capstone.com/peers/peer1.faculty.capstone.com/msp
    ports: ["10051:7051"]
    networks: [registrar-net]
    volumes: ["./crypto-config-final-v2:/etc/hyperledger/fabric/crypto-config-final-v2"]
    depends_on: [couchdb_faculty_peer1]

  peer0.department.capstone.com:
    container_name: peer0.department.capstone.com
    image: hyperledger/fabric-peer:${FABRIC_VERSION:-2.5.4}
    environment:
      - CORE_PEER_ID=peer0.department.capstone.com
      - CORE_PEER_ADDRESS=peer0.department.capstone.com:7051
      - CORE_PEER_LOCALMSPID=DepartmentMSP
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.department.capstone.com:7051
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.registrar.capstone.com:7051,peer0.faculty.capstone.com:7051,peer0.department.capstone.com:7051
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb_department:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=${COUCHDB_USER}
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=${COUCHDB_PASS}
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/crypto-config-final-v2/peerOrganizations/department.capstone.com/peers/peer0.department.capstone.com/tls/ca.crt
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/crypto-config-final-v2/peerOrganizations/department.capstone.com/peers/peer0.department.capstone.com/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/crypto-config-final-v2/peerOrganizations/department.capstone.com/peers/peer0.department.capstone.com/tls/server.key
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/crypto-config-final-v2/peerOrganizations/department.capstone.com/peers/peer0.department.capstone.com/msp
    ports: ["11051:7051"]
    networks: [registrar-net]
    volumes: 
      - ./crypto-config-final-v2:/etc/hyperledger/fabric/crypto-config-final-v2
    depends_on: [couchdb_department]

  peer1.department.capstone.com:
    container_name: peer1.department.capstone.com
    image: hyperledger/fabric-peer:${FABRIC_VERSION:-2.5.4}
    environment:
      - CORE_PEER_ID=peer1.department.capstone.com
      - CORE_PEER_ADDRESS=peer1.department.capstone.com:7051
      - CORE_PEER_LOCALMSPID=DepartmentMSP
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer1.department.capstone.com:7051
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.registrar.capstone.com:7051,peer0.faculty.capstone.com:7051,peer0.department.capstone.com:7051
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb_department_peer1:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=${COUCHDB_USER}
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=${COUCHDB_PASS}
      - CORE_PEER_TLS_ENABLED=false
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/crypto-config-final-v2/peerOrganizations/department.capstone.com/peers/peer1.department.capstone.com/msp
    ports: ["12051:7051"]
    networks: [registrar-net]
    volumes: ["./crypto-config-final-v2:/etc/hyperledger/fabric/crypto-config-final-v2"]
    depends_on: [couchdb_department_peer1]

  # --- IPFS NODES ---
  ipfs0:
    image: ${IPFS_IMAGE:-ipfs/kubo:latest}
    container_name: ipfs0
    environment: [IPFS_PROFILE=server]
    networks: [registrar-net]
    ports: ["5001:5001"]
    volumes: ["./ipfs_data/peer0:/data/ipfs"]

  ipfs1:
    image: ${IPFS_IMAGE:-ipfs/kubo:latest}
    container_name: ipfs1
    environment: [IPFS_PROFILE=server]
    networks: [registrar-net]
    ports: ["5002:5001","8081:8080"]
    volumes: ["./ipfs_data/peer1:/data/ipfs"]

  ipfs2:
    image: ${IPFS_IMAGE:-ipfs/kubo:latest}
    container_name: ipfs2
    environment: [IPFS_PROFILE=server]
    networks: [registrar-net]
    ports: ["5003:5001","8082:8080"]
    volumes: ["./ipfs_data/peer2:/data/ipfs"]

  ipfs3:
    image: ${IPFS_IMAGE:-ipfs/kubo:latest}
    container_name: ipfs3
    environment: [IPFS_PROFILE=server]
    networks: [registrar-net]
    ports: ["5004:5001","8083:8080"]
    volumes: ["./ipfs_data/peer3:/data/ipfs"]

  ipfs4:
    image: ${IPFS_IMAGE:-ipfs/kubo:latest}
    container_name: ipfs4
    environment: [IPFS_PROFILE=server]
    networks: [registrar-net]
    ports: ["5005:5001","8084:8080"]
    volumes: ["./ipfs_data/peer4:/data/ipfs"]

  ipfs5:
    image: ${IPFS_IMAGE:-ipfs/kubo:latest}
    container_name: ipfs5
    environment: [IPFS_PROFILE=server]
    networks: [registrar-net]
    ports: ["5006:5001","8085:8080"]
    volumes: ["./ipfs_data/peer5:/data/ipfs"]

  # --- UTILITY ---
  postgres:
    image: postgres:14-alpine
    container_name: postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASS}
      - POSTGRES_DB=${POSTGRES_DB}
    ports: ["5432:5432"]
    networks: [registrar-net]
    volumes: 
      - "pgdata:/var/lib/postgresql/data"
      - "./init-db-schema.sql:/docker-entrypoint-initdb.d/init.sql:ro"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
 
  nginx-shield:
    image: nginx:stable-alpine
    container_name: nginx-shield
    ports: ["8080:80"]
    volumes:
      - "../middleware/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro"
      - "../frontend/build_data:/usr/share/nginx/html:ro"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks: [registrar-net]
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 3

  registrar-chaincode:
    container_name: registrar-chaincode
    build:
      context: ../chaincode
      dockerfile: Dockerfile
    environment:
      - CHAINCODE_SERVER_ADDRESS=0.0.0.0:9999
      - CHAINCODE_ID=${CHAINCODE_ID}
      - CHAINCODE_TLS_DISABLED=false
      - CHAINCODE_TLS_KEY_FILE=/etc/hyperledger/fabric/crypto-config-final-v2/peerOrganizations/registrar.capstone.com/peers/peer0.registrar.capstone.com/tls/server.key
      - CHAINCODE_TLS_CERT_FILE=/etc/hyperledger/fabric/crypto-config-final-v2/peerOrganizations/registrar.capstone.com/peers/peer0.registrar.capstone.com/tls/server.crt
      - CHAINCODE_CLIENT_CA_CERT_FILE=/etc/hyperledger/fabric/crypto-config-final-v2/peerOrganizations/registrar.capstone.com/tlsca/tlsca.registrar.capstone.com-cert.pem
    ports: ["9999:9999"]
    networks: [registrar-net]
    volumes:
      - ./crypto-config-final-v2:/etc/hyperledger/fabric/crypto-config-final-v2

  cli:
    container_name: cli
    image: hyperledger/fabric-tools:${FABRIC_VERSION:-2.5.4}
    tty: true
    stdin_open: true
    environment:
      - GOPATH=/opt/gopath
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - FABRIC_CFG_PATH=/opt/fabric-config/network/config
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_ID=cli
      - CORE_PEER_ADDRESS=peer0.registrar.capstone.com:7051
      - CORE_PEER_LOCALMSPID=RegistrarMSP
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/crypto-config-final-v2/peerOrganizations/registrar.capstone.com/peers/peer0.registrar.capstone.com/tls/ca.crt
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/crypto-config-final-v2/peerOrganizations/registrar.capstone.com/users/Admin@registrar.capstone.com/msp
    working_dir: /opt/fabric-config/network
    networks: [registrar-net]
    volumes:
      - /var/run/:/host/var/run/
      - ./crypto-config-final-v2:/etc/hyperledger/fabric/crypto-config-final-v2
      - ./:/opt/fabric-config/network

volumes:
  pgdata: