server {
    listen 80;
    server_name localhost;

    location = /nginx-health {
        access_log off;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "no-store" always;
        return 503 "redirector\n";
    }

    location / {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store" always;
        try_files /index.html =200;
    }
}
