<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Cache-Control" content="no-store">
    <meta http-equiv="refresh" content="5;url=http://localhost:8100/">
    <title>BLOCKGO Failover</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, sans-serif;
        color: #172033;
        background: #f7f9fc;
      }

      main {
        width: min(420px, calc(100vw - 32px));
        text-align: center;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 22px;
      }

      p {
        margin: 0;
        line-height: 1.5;
        color: #4b5563;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Reconnecting</h1>
      <p>This access point is offline. Moving you to an available BLOCKGO access point.</p>
    </main>

    <script>
      (function () {
        var host = window.location.hostname || 'localhost';
        var protocol = window.location.protocol || 'http:';
        var currentOrigin = window.location.origin;
        var path = window.location.pathname + window.location.search + window.location.hash;
        var targets = [
          protocol + '//' + host + ':8080',
          protocol + '//' + host + ':8090',
          protocol + '//' + host + ':8100',
          'http://localhost:8080',
          'http://localhost:8090',
          'http://localhost:8100'
        ].filter(function (value, index, self) {
          return value !== currentOrigin && self.indexOf(value) === index;
        });

        function check(origin) {
          return fetch(origin + '/nginx-health?t=' + Date.now(), { cache: 'no-store' })
            .then(function (response) { return response.ok ? origin : null; })
            .catch(function () { return null; });
        }

        targets.reduce(function (chain, origin) {
          return chain.then(function (found) {
            return found || check(origin);
          });
        }, Promise.resolve(null)).then(function (origin) {
          window.location.replace((origin || targets[0]) + path);
        });
      }());
    </script>
  </body>
</html>
