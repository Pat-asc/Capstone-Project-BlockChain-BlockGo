networks:
  department-net:
    name: department-net
  registrar-net:
    name: registrar-net

services:
  ca.department.capstone.com:
    image: hyperledger/fabric-ca:1.5.7
    container_name: ca.department.capstone.com
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-department
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=7054
      - FABRIC_CA_SERVER_CSR_HOSTS=127.0.0.1,localhost,ca.department.capstone.com
      - FABRIC_CA_SERVER_REGISTRY_IDENTITIES_0_NAME=admin
      - FABRIC_CA_SERVER_REGISTRY_IDENTITIES_0_PASS=${BOOTSTRAP_REGISTRAR_PASS:-adminpw}
      - FABRIC_CA_SERVER_REGISTRY_IDENTITIES_0_ATTRS=hf.Registrar.Roles=*,hf.Registrar.DelegateRoles=*,hf.Revoker=true,hf.IntermediateCA=true,hf.GenCRL=true,hf.Registrar.Attributes=*,hf.AffiliationMgr=true
    ports: ["9054:7054"]
    command: sh -c 'fabric-ca-server start -b admin:${BOOTSTRAP_REGISTRAR_PASS:-adminpw} -d'
    volumes:
      - ./fabric-ca/department:/etc/hyperledger/fabric-ca-server
    networks: [department-net, registrar-net]

  couchdb_department:
    image: couchdb:3.2.2
    container_name: couchdb_department
    environment:
      - COUCHDB_USER=${COUCHDB_USER}
      - COUCHDB_PASSWORD=${COUCHDB_PASS}
      - COUCHDB_SINGLE_NODE=true
    ports: ["7984:5984"]
    networks: [department-net]

  couchdb_department_peer1:
    image: couchdb:3.2.2
    container_name: couchdb_department_peer1
    environment:
      - COUCHDB_USER=${COUCHDB_USER}
      - COUCHDB_PASSWORD=${COUCHDB_PASS}
      - COUCHDB_SINGLE_NODE=true
    ports: ["7985:5984"]
    networks: [department-net]

  peer0.department.capstone.com:
    container_name: peer0.department.capstone.com
    user: "root"
    image: hyperledger/fabric-peer:2.5.4
    environment:
      - CORE_PEER_ID=peer0.department.capstone.com
      - CORE_PEER_ADDRESS=peer0.department.capstone.com:7051
      - CORE_PEER_LOCALMSPID=DepartmentMSP
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.department.capstone.com:7051
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer1.department.capstone.com:7051
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb_department:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=${COUCHDB_USER}
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=${COUCHDB_PASS}
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/crypto-config-final-v2/peerOrganizations/department.capstone.com/peers/peer0.department.capstone.com/tls/ca.crt
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/crypto-config-final-v2/peerOrganizations/department.capstone.com/peers/peer0.department.capstone.com/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/crypto-config-final-v2/peerOrganizations/department.capstone.com/peers/peer0.department.capstone.com/tls/server.key
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/crypto-config-final-v2/peerOrganizations/department.capstone.com/peers/peer0.department.capstone.com/msp
      - CORE_PEER_EXTERNALBUILDER_REGISTRY_BUILDERS_0_NAME=ccaas_builder
      - CORE_PEER_EXTERNALBUILDER_REGISTRY_BUILDERS_0_PATH=/opt/builders/ccaas
      - CORE_PEER_EXTERNALBUILDER_REGISTRY_BUILDERS_0_PROPAGATEENVIRONMENT=CHAINCODE_SERVER_ADDRESS,CHAINCODE_TLS_DISABLED
    ports: ["11051:7051"]
    networks: [department-net, registrar-net]
    extra_hosts:
      - "orderer.capstone.com:${MAIN_CAMPUS_IP}"
      - "peer0.registrar.capstone.com:${MAIN_CAMPUS_IP}"
      - "peer1.registrar.capstone.com:${MAIN_CAMPUS_IP}"
      - "registrar-chaincode:${MAIN_CAMPUS_IP}"
      - "peer0.faculty.capstone.com:${ANNEX_CAMPUS_IP}"
      - "peer1.faculty.capstone.com:${ANNEX_CAMPUS_IP}"
    volumes: 
      - ./config/core.yaml:/etc/hyperledger/fabric/core.yaml
      - ./crypto-config-final-v2:/etc/hyperledger/fabric/crypto-config-final-v2
      - ./builders:/opt/builders
    depends_on: [couchdb_department]

  peer1.department.capstone.com:
    container_name: peer1.department.capstone.com
    user: "root"
    image: hyperledger/fabric-peer:2.5.4
    environment:
      - CORE_PEER_ID=peer1.department.capstone.com
      - CORE_PEER_ADDRESS=peer1.department.capstone.com:7051
      - CORE_PEER_LOCALMSPID=DepartmentMSP
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer1.department.capstone.com:7051
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.department.capstone.com:7051
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb_department_peer1:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=${COUCHDB_USER}
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=${COUCHDB_PASS}
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/crypto-config-final-v2/peerOrganizations/department.capstone.com/peers/peer1.department.capstone.com/tls/ca.crt
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/crypto-config-final-v2/peerOrganizations/department.capstone.com/peers/peer1.department.capstone.com/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/crypto-config-final-v2/peerOrganizations/department.capstone.com/peers/peer1.department.capstone.com/tls/server.key
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/crypto-config-final-v2/peerOrganizations/department.capstone.com/peers/peer1.department.capstone.com/msp
      - CORE_PEER_EXTERNALBUILDER_REGISTRY_BUILDERS_0_NAME=ccaas_builder
      - CORE_PEER_EXTERNALBUILDER_REGISTRY_BUILDERS_0_PATH=/opt/builders/ccaas
      - CORE_PEER_EXTERNALBUILDER_REGISTRY_BUILDERS_0_PROPAGATEENVIRONMENT=CHAINCODE_SERVER_ADDRESS,CHAINCODE_TLS_DISABLED
    ports: ["12051:7051"]
    networks: [department-net, registrar-net]
    extra_hosts:
      - "orderer.capstone.com:${MAIN_CAMPUS_IP}"
      - "orderer2.capstone.com:${ANNEX_CAMPUS_IP}"
      - "orderer3.capstone.com:${PUBAD_CAMPUS_IP}"
      - "peer0.registrar.capstone.com:${MAIN_CAMPUS_IP}"
      - "peer1.registrar.capstone.com:${MAIN_CAMPUS_IP}"
      - "registrar-chaincode:${MAIN_CAMPUS_IP}"
      - "peer0.faculty.capstone.com:${ANNEX_CAMPUS_IP}"
      - "peer1.faculty.capstone.com:${ANNEX_CAMPUS_IP}"
    volumes:
      - ./config/core.yaml:/etc/hyperledger/fabric/core.yaml
      - ./crypto-config-final-v2:/etc/hyperledger/fabric/crypto-config-final-v2
      - ./builders:/opt/builders
    depends_on: [couchdb_department_peer1]

  couchdb_wallet_department:
    image: couchdb:3.2.2
    container_name: couchdb_wallet_department
    environment:
      - COUCHDB_USER=${COUCHDB_USER}
      - COUCHDB_PASSWORD=${COUCHDB_PASS}
    ports: ["7990:5984"]
    networks: [department-net, registrar-net]

  ipfs4:
    image: ipfs/kubo:latest
    container_name: ipfs4
    environment: 
      - IPFS_PROFILE=server
      - LIBP2P_FORCE_PNET=1
    networks:
      department-net:
        aliases:
          - ipfs
      registrar-net:
    ports: ["5005:5001","8085:8080"]
    volumes: 
      - "./ipfs_data/peer4:/data/ipfs"
      - "./swarm.key:/data/ipfs/swarm.key"

  ipfs5:
    image: ipfs/kubo:latest
    container_name: ipfs5
    environment: 
      - IPFS_PROFILE=server
      - LIBP2P_FORCE_PNET=1
    networks: [department-net, registrar-net]
    ports: ["5006:5001","8086:8080"]
    volumes: 
      - "./ipfs_data/peer5:/data/ipfs"
      - "./swarm.key:/data/ipfs/swarm.key"

  orderer3.capstone.com:
    image: hyperledger/fabric-orderer:2.5.4
    container_name: orderer3.capstone.com
    environment:
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=9050
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_BOOTSTRAPMETHOD=file
      - ORDERER_GENERAL_BOOTSTRAPFILE=/var/hyperledger/orderer/orderer.genesis.block
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=/var/hyperledger/orderer/tls/ca.crt
      - ORDERER_ADMIN_LISTENADDRESS=0.0.0.0:9053
      - ORDERER_ADMIN_TLS_ENABLED=true
      - ORDERER_ADMIN_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_ADMIN_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_ADMIN_TLS_ROOTCAS=/var/hyperledger/orderer/tls/ca.crt
      - ORDERER_ADMIN_TLS_CLIENTAUTHREQUIRED=true
    ports: ["9050:9050", "9053:9053"]
    networks: [department-net, registrar-net]
    extra_hosts:
      - "orderer.capstone.com:${MAIN_CAMPUS_IP}"
      - "orderer2.capstone.com:${ANNEX_CAMPUS_IP}"
    volumes:
      - ./channel-artifacts-final/orderer.genesis.block:/var/hyperledger/orderer/orderer.genesis.block
      - ./crypto-config-final-v2/ordererOrganizations/capstone.com/orderers/orderer3.capstone.com/msp:/var/hyperledger/orderer/msp
      - ./crypto-config-final-v2/ordererOrganizations/capstone.com/orderers/orderer3.capstone.com/tls:/var/hyperledger/orderer/tls

  postgres-pubad:
    image: bitnami/postgresql:latest
    container_name: postgres-pubad
    environment:
      - POSTGRESQL_REPLICATION_MODE=slave
      - POSTGRESQL_REPLICATION_USER=repl_user
      - POSTGRESQL_REPLICATION_PASSWORD=repl_password
      - POSTGRESQL_MASTER_HOST=postgres
      - POSTGRESQL_MASTER_PORT_NUMBER=5432
      - POSTGRESQL_USERNAME=${POSTGRES_USER}
      - POSTGRESQL_PASSWORD=${POSTGRES_PASS}
      - POSTGRESQL_DATABASE=${POSTGRES_DB}
    ports: ["5434:5432"]
    networks: [department-net, registrar-net]
    volumes: 
      - "pgdata-pubad:/bitnami/postgresql"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -h 127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 90s
    depends_on:
      postgres:
        condition: service_healthy

  nginx-shield-pubad:
    image: nginx:stable-alpine
    container_name: nginx-shield-pubad
    restart: unless-stopped
    ports: ["8100:80"]
    volumes:
      - "../middleware/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro"
      - "../frontend/build:/usr/share/nginx/html:ro"
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "main.capstone.com:${MAIN_CAMPUS_IP}"
      - "annex.capstone.com:${ANNEX_CAMPUS_IP}"
      - "pubad.capstone.com:${PUBAD_CAMPUS_IP}"
    networks: [department-net]
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/nginx-health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  department-chaincode:
    container_name: department-chaincode
    build:
      context: ../chaincode
      dockerfile: Dockerfile
    environment:
      - CHAINCODE_SERVER_ADDRESS=0.0.0.0:9999
      - CHAINCODE_ID=${CHAINCODE_ID_DEPARTMENT}
      - CHAINCODE_TLS_DISABLED=false
      - CHAINCODE_TLS_KEY_FILE=/etc/hyperledger/fabric/crypto-config-final-v2/chaincode-tls/keystore/server.key
      - CHAINCODE_TLS_CERT_FILE=/etc/hyperledger/fabric/crypto-config-final-v2/chaincode-tls/signcerts/server.crt
      - CHAINCODE_CLIENT_CA_CERT_FILE=/etc/hyperledger/fabric/crypto-config-final-v2/chaincode-tls/ca-bundle/ca-bundle.pem
    ports: ["9997:9999"]
    networks: [department-net]
    volumes:
      - ./crypto-config-final-v2:/etc/hyperledger/fabric/crypto-config-final-v2
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9999"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  cli-department:
    container_name: cli-department
    image: hyperledger/fabric-tools:2.5.4
    tty: true
    stdin_open: true
    environment:
      - GOPATH=/opt/gopath
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - FABRIC_CFG_PATH=/opt/fabric-config/network/config
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_ID=cli-department
      - CORE_PEER_ADDRESS=peer0.department.capstone.com:7051
      - CORE_PEER_LOCALMSPID=DepartmentMSP
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/crypto-config-final-v2/peerOrganizations/department.capstone.com/peers/peer0.department.capstone.com/tls/ca.crt
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/crypto-config-final-v2/peerOrganizations/department.capstone.com/users/Admin@department.capstone.com/msp
    working_dir: /opt/fabric-config/network
    networks: [department-net]
    volumes:
      - ./bin:/usr/local/bin
      - /var/run/:/host/var/run/
      - ./crypto-config-final-v2:/etc/hyperledger/fabric/crypto-config-final-v2
      - ./:/opt/fabric-config/network

volumes:
  pgdata-pubad:
