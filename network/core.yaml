peer:
  # This file provides settings that are common to all peers.
  # Peer-specific settings (id, address, localMspId, and all TLS paths)
  # are correctly defined via environment variables in the docker-compose.yaml file.
  # By removing the hardcoded paths from this file, we allow the environment
  # variables to properly configure each peer, which fixes the TLS handshake
  # and identity validation errors.
  #
  # The only settings retained here are for CCaaS and the Docker VM network mode,
  # which are common across all peers in this deployment.
  tls:
    enabled: true
    clientAuthRequired: false

vm:
  endpoint: unix:///var/run/docker.sock
  docker:
    hostConfig:
      NetworkMode: registrar-net

chaincode:
  externalBuilders:
    - path: /usr/local/bin/ccaas_builder
      name: ccaas_builder
      propagateEnvironment:
        - HOME
        - PATH
        - LD_LIBRARY_PATH